version: "3"

services:

  dicom_server:
    build: ./server
    container_name: dicom_server
    ports:
      - "11112:11112"
    volumes:
      - ./data:/data

  dicom_client1:
    build: ./client
    depends_on:
      - dicom_server

  dicom_client2:
    build: ./client
    depends_on:
      - dicom_server

  dicom_malicious_client:
    build: ./malicious-client
    depends_on:
      - dicom_server
